<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="100%" height="100%">
  <defs>
    <!-- Light Theme Styles -->
    <style>
      .bg { fill: #F8F9FA; }
      .grid-line { stroke: rgba(18, 19, 26, 0.05); stroke-width: 1; }
      .text-primary { fill: #12131A; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .text-secondary { fill: #626676; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .text-brand { fill: #5148B8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .text-mono { font-family: "JetBrains Mono", "SF Mono", Consolas, monospace; }
      
      .border-sharp { stroke: rgba(18, 19, 26, 0.12); stroke-width: 1; }
      .border-brand { stroke: rgba(81, 72, 184, 0.3); stroke-width: 1.5; }
      
      .panel-bg { fill: #FFFFFF; }
      .panel-header-bg { fill: #F1F3F5; }
      
      .terminal-bg { fill: #11131A; }
      .terminal-text { fill: #E9ECEF; font-family: "JetBrains Mono", "SF Mono", Consolas, monospace; }
      .terminal-text-dim { fill: #6C757D; font-family: "JetBrains Mono", "SF Mono", Consolas, monospace; }
      .terminal-prompt { fill: #8B5CF6; font-family: "JetBrains Mono", "SF Mono", Consolas, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1200" height="750" />

  <!-- Swiss Mathematical 12-Column Grid Lines (Background Guide) -->
  <g>
    <line x1="100" y1="0" x2="100" y2="750" class="grid-line" />
    <line x1="180" y1="0" x2="180" y2="750" class="grid-line" />
    <line x1="260" y1="0" x2="260" y2="750" class="grid-line" />
    <line x1="340" y1="0" x2="340" y2="750" class="grid-line" />
    <line x1="420" y1="0" x2="420" y2="750" class="grid-line" />
    <line x1="500" y1="0" x2="500" y2="750" class="grid-line" />
    <line x1="580" y1="0" x2="580" y2="750" class="grid-line" />
    <line x1="660" y1="0" x2="660" y2="750" class="grid-line" />
    <line x1="740" y1="0" x2="740" y2="750" class="grid-line" />
    <line x1="820" y1="0" x2="820" y2="750" class="grid-line" />
    <line x1="900" y1="0" x2="900" y2="750" class="grid-line" />
    <line x1="980" y1="0" x2="980" y2="750" class="grid-line" />
    <line x1="1060" y1="0" x2="1060" y2="750" class="grid-line" />
    <line x1="1100" y1="0" x2="1100" y2="750" class="grid-line" />
  </g>

  <!-- ==================== HEADER ==================== -->
  <g transform="translate(100, 40)">
    <!-- Logo -->
    <text x="0" y="20" class="text-primary" font-weight="900" font-size="22" letter-spacing="-0.03em">LessJS</text>
    
    <!-- Navigation (Swiss aligned to column grids) -->
    <text x="240" y="18" class="text-secondary" font-weight="600" font-size="13">Guide</text>
    <text x="320" y="18" class="text-secondary" font-weight="600" font-size="13">API</text>
    <text x="400" y="18" class="text-secondary" font-weight="600" font-size="13">Architecture</text>
    <text x="560" y="18" class="text-secondary" font-weight="600" font-size="13">Hub</text>
    
    <text x="960" y="18" class="text-brand" font-weight="700" font-size="13">GitHub ↗</text>
    <line x1="0" y1="40" x2="1000" y2="40" class="border-sharp" />
  </g>

  <!-- ==================== LEFT HERO (Typography Focus) ==================== -->
  <g transform="translate(100, 160)">
    <!-- Category Eyebrow -->
    <text x="0" y="0" class="text-brand" font-weight="700" font-size="11" letter-spacing="0.15em">V0.24.4 CURRENT RELEASE</text>
    
    <!-- Main Big Title (Swiss Style: Massive, Sans-serif, High letter-spacing reduction) -->
    <text x="-4" y="90" class="text-primary" font-weight="900" font-size="96" letter-spacing="-0.05em">LessJS.</text>
    
    <!-- Description -->
    <text x="0" y="145" class="text-secondary" font-weight="400" font-size="16" line-height="1.6">
      <tspan x="0" dy="0">DSD-first Web Components application framework.</tspan>
      <tspan x="0" dy="26">Static Output + Progressive Islands + Hono API routes.</tspan>
      <tspan x="0" dy="26">Zero external runtime dependencies in your core bundle.</tspan>
    </text>

    <!-- Interactive Terminal Command -->
    <g transform="translate(0, 240)">
      <rect width="420" height="88" rx="4" class="terminal-bg" />
      <!-- Top header of terminal -->
      <line x1="0" y1="28" x2="420" y2="28" stroke="#2D3139" stroke-width="1" />
      <circle cx="15" cy="14" r="4" fill="#EF4444" />
      <circle cx="27" cy="14" r="4" fill="#F59E0B" />
      <circle cx="39" cy="14" r="4" fill="#10B981" />
      <text x="70" y="18" class="terminal-text-dim" font-size="11" font-weight="600">create-less-app</text>
      
      <!-- Command text -->
      <text x="18" y="58" class="terminal-prompt" font-weight="700" font-size="13">$</text>
      <text x="36" y="58" class="terminal-text" font-weight="500" font-size="13">deno run -A jsr:@lessjs/create my-app</text>
    </g>

    <!-- Buttons (Flat, high contrast, pure Swiss style) -->
    <g transform="translate(0, 360)">
      <!-- Primary -->
      <rect width="130" height="42" rx="4" fill="#12131A" />
      <text x="65" y="25" fill="#FFFFFF" font-family="-apple-system, sans-serif" font-weight="700" font-size="13" text-anchor="middle">Start Building</text>
      
      <!-- Secondary -->
      <rect x="146" width="130" height="42" rx="4" fill="none" class="border-sharp" />
      <text x="211" y="25" class="text-primary" font-weight="700" font-size="13" text-anchor="middle">Read Docs</text>
    </g>
  </g>

  <!-- ==================== RIGHT PANEL (Beautified Interactive Console) ==================== -->
  <g transform="translate(620, 160)">
    <!-- Panel Container -->
    <rect width="480" height="480" rx="4" class="panel-bg" class="border-sharp" filter="drop-shadow(0 20px 40px rgba(0,0,0,0.03))" />
    <rect width="480" height="480" rx="4" fill="none" class="border-sharp" />

    <!-- Panel Header (Tabbed) -->
    <g>
      <rect width="480" height="52" class="panel-header-bg" />
      <line x1="0" y1="52" x2="480" y2="52" class="border-sharp" />
      
      <!-- Window Dots -->
      <circle cx="20" cy="26" r="3" fill="#12131A" opacity="0.3" />
      <circle cx="30" cy="26" r="3" fill="#12131A" opacity="0.3" />
      <circle cx="40" cy="26" r="3" fill="#12131A" opacity="0.3" />
      
      <text x="64" y="31" class="text-primary" font-weight="700" font-size="13">CONSOLE</text>
      
      <!-- Tabs (Aligned Right) -->
      <!-- Tab 1 (Active) -->
      <rect x="230" y="14" width="56" height="24" rx="12" fill="#5148B8" />
      <text x="258" y="30" fill="#FFFFFF" font-family="-apple-system, sans-serif" font-weight="700" font-size="11" text-anchor="middle">DSD</text>
      
      <!-- Tab 2 -->
      <rect x="294" y="14" width="56" height="24" rx="12" fill="none" class="border-sharp" />
      <text x="322" y="30" class="text-secondary" font-weight="700" font-size="11" text-anchor="middle">GRAPH</text>
      
      <!-- Tab 3 -->
      <rect x="358" y="14" width="56" height="24" rx="12" fill="none" class="border-sharp" />
      <text x="386" y="30" class="text-secondary" font-weight="700" font-size="11" text-anchor="middle">BUILD</text>

      <!-- Tab 4 -->
      <rect x="422" y="14" width="46" height="24" rx="12" fill="none" class="border-sharp" />
      <text x="445" y="30" class="text-secondary" font-weight="700" font-size="11" text-anchor="middle">INFO</text>
    </g>

    <!-- Panel Content (Code visual block) -->
    <!-- Pane 1: Left Code Block (Rendered DSD Output) -->
    <g transform="translate(16, 68)">
      <rect width="216" height="396" rx="4" class="terminal-bg" />
      <text x="12" y="24" class="text-brand" font-weight="700" font-size="9" letter-spacing="0.1em">GENERATED DSD OUTPUT</text>
      
      <!-- XML Code rendering -->
      <g transform="translate(12, 44)" font-size="11" font-weight="500">
        <text x="0" y="15" fill="#F43F5E">&lt;home-page&gt;</text>
        <text x="8" y="35" fill="#F43F5E">  &lt;template <tspan fill="#38BDF8">shadowrootmode</tspan>=<tspan fill="#34D399">"open"</tspan>&gt;</text>
        <text x="16" y="55" fill="#F43F5E">    &lt;style&gt;</text>
        <text x="24" y="75" fill="#60A5FA">      main {</text>
        <text x="24" y="95" fill="#34D399">        display: grid;</text>
        <text x="24" y="115" fill="#34D399">        gap: 1rem;</text>
        <text x="24" y="135" fill="#60A5FA">      }</text>
        <text x="16" y="155" fill="#F43F5E">    &lt;/style&gt;</text>
        <text x="16" y="175" fill="#F43F5E">    &lt;main&gt;</text>
        <text x="24" y="195" fill="#F43F5E">      &lt;h1&gt;<tspan fill="#E9ECEF">LessJS</tspan>&lt;/h1&gt;</text>
        <text x="24" y="215" fill="#F43F5E">      &lt;my-counter <tspan fill="#38BDF8">client:idle</tspan>&gt;</text>
        <text x="24" y="235" fill="#E9ECEF">        #shadow-root (open)</text>
        <text x="24" y="255" fill="#F43F5E">      &lt;/my-counter&gt;</text>
        <text x="16" y="275" fill="#F43F5E">    &lt;/main&gt;</text>
        <text x="8" y="295" fill="#F43F5E">  &lt;/template&gt;</text>
        <text x="0" y="315" fill="#F43F5E">&lt;/home-page&gt;</text>
      </g>
    </g>

    <!-- Pane 2: Right Code Block (Component Source TSX) -->
    <g transform="translate(248, 68)">
      <rect width="216" height="396" rx="4" class="terminal-bg" />
      <text x="12" y="24" class="text-brand" font-weight="700" font-size="9" letter-spacing="0.1em">COMPONENT TSX SOURCE</text>
      
      <!-- TSX Code rendering -->
      <g transform="translate(12, 44)" font-size="11" font-weight="500">
        <text x="0" y="15" fill="#FB7185">import</text>
        <text x="44" y="15" fill="#E9ECEF">{ DsdElement,</text>
        <text x="12" y="35" fill="#E9ECEF">  signal }</text>
        <text x="80" y="35" fill="#FB7185">from</text>
        <text x="112" y="35" fill="#34D399">"@lessjs/core"</tspan>;</text>
        
        <text x="0" y="70" fill="#FB7185">export class <tspan fill="#60A5FA">MyCounter</tspan></text>
        <text x="12" y="90" fill="#FB7185">extends <tspan fill="#60A5FA">DsdElement</tspan> {</text>
        
        <text x="8" y="120" fill="#E9ECEF">count = signal(0);</text>
        
        <text x="8" y="150" fill="#38BDF8">render</text>
        <text x="44" y="150" fill="#E9ECEF">() {</text>
        <text x="16" y="170" fill="#FB7185">return (</text>
        
        <!-- TSX Elements -->
        <text x="24" y="195" fill="#F43F5E">  &lt;button</text>
        <text x="32" y="215" fill="#38BDF8">    onClick</text>
        <text x="76" y="215" fill="#E9ECEF">={() =&gt; this.count++}</text>
        <text x="24" y="235" fill="#F43F5E">  &gt;</text>
        <text x="32" y="255" fill="#E9ECEF">    Count {this.count}</text>
        <text x="24" y="275" fill="#F43F5E">  &lt;/button&gt;</text>
        
        <text x="16" y="295" fill="#FB7185">);</text>
        <text x="8" y="315" fill="#E9ECEF">}</text>
        <text x="0" y="335" fill="#E9ECEF">}</text>
      </g>
    </g>
  </g>
</svg>
