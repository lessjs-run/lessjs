<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep Space Obsidian -->
    <linearGradient id="obsidian" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#040508" />
      <stop offset="100%" stop-color="#0B0D13" />
    </linearGradient>

    <!-- Glowing Purple/Neon Gradients -->
    <linearGradient id="cyberPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C6FF5" />
      <stop offset="100%" stop-color="#B166FA" />
    </linearGradient>

    <linearGradient id="laserGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF87" />
      <stop offset="100%" stop-color="#60EFFF" />
    </linearGradient>

    <linearGradient id="gridGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C6FF5" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#00FF87" stop-opacity="0.0" />
    </linearGradient>

    <!-- Filters for Futuristic Glows -->
    <filter id="purpleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="laserLineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- General Typography Classes -->
    <style>.text-neo { font-family: "SF Pro Display", -apple-system, system-ui, sans-serif; }
      .text-code { font-family: "JetBrains Mono", "Fira Code", monospace; }
      .border-futuristic { stroke: rgba(124, 111, 245, 0.16); stroke-width: 1; }
      .border-bright { stroke: rgba(124, 111, 245, 0.4); stroke-width: 1; }</style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#obsidian)" />

  <!-- Neo-Swiss Cyber Grid -->
  <g>
    <!-- Horizontal lines -->
    <line x1="0" y1="80" x2="1200" y2="80" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="0" y1="160" x2="1200" y2="160" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="0" y1="240" x2="1200" y2="240" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="0" y1="320" x2="1200" y2="320" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="0" y1="400" x2="1200" y2="400" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="0" y1="480" x2="1200" y2="480" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="0" y1="560" x2="1200" y2="560" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="0" y1="640" x2="1200" y2="640" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="0" y1="720" x2="1200" y2="720" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

    <!-- Vertical Lines mapped to Swiss 12-Column Layout -->
    <line x1="80" y1="0" x2="80" y2="800" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="180" y1="0" x2="180" y2="800" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="280" y1="0" x2="280" y2="800" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="380" y1="0" x2="380" y2="800" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="480" y1="0" x2="480" y2="800" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="580" y1="0" x2="580" y2="800" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="680" y1="0" x2="680" y2="800" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="780" y1="0" x2="780" y2="800" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="880" y1="0" x2="880" y2="800" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="980" y1="0" x2="980" y2="800" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="1080" y1="0" x2="1080" y2="800" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <line x1="1120" y1="0" x2="1120" y2="800" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  </g>

  <!-- Glowing Grid Accent Shape (Adds cyber atmosphere) -->
  <rect x="80" y="80" width="1000" height="640" fill="url(#gridGradient)" />

  <!-- ==================== HEADER ==================== -->
  <g transform="translate(80, 0)">
    <rect width="1040" height="80" fill="none" />
    <line x1="0" y1="80" x2="1040" y2="80" stroke="rgba(124, 111, 245, 0.2)" stroke-width="1" />

    <!-- Logo with purple cyber glow -->
    <text
      x="0"
      y="48"
      class="text-neo"
      font-weight="900"
      font-size="24"
      fill="url(#cyberPurple)"
      letter-spacing="-0.04em"
      filter="url(#purpleGlow)"
    >LessJS</text>
    <text
      x="96"
      y="45"
      class="text-neo"
      font-weight="500"
      font-size="12"
      fill="#00FF87"
      letter-spacing="0.2em"
      filter="url(#greenGlow)"
    >RUNTIME KERNEL</text>

    <!-- Navigation Alignment -->
    <text
      x="360"
      y="46"
      class="text-neo"
      font-weight="700"
      font-size="13"
      fill="#E9ECEF"
    >GUIDE</text>
    <text
      x="440"
      y="46"
      class="text-neo"
      font-weight="600"
      font-size="13"
      fill="#8E92A2"
    >API REFERENCE</text>
    <text
      x="580"
      y="46"
      class="text-neo"
      font-weight="600"
      font-size="13"
      fill="#8E92A2"
    >ARCHITECTURE</text>
    <text
      x="720"
      y="46"
      class="text-neo"
      font-weight="600"
      font-size="13"
      fill="#8E92A2"
    >REGISTRY HUB</text>

    <!-- Pulse indicators -->
    <circle cx="1016" cy="42" r="5" fill="#00FF87" filter="url(#greenGlow)" />
    <text
      x="1030"
      y="46"
      class="text-code"
      font-weight="700"
      font-size="12"
      fill="#E9ECEF"
      text-anchor="end"
    >SYS ONLINE</text>
  </g>

  <!-- ==================== MAIN LEFT: GIGA TYPOGRAPHY ==================== -->
  <g transform="translate(80, 140)">
    <!-- Micro label -->
    <text
      x="0"
      y="0"
      class="text-code"
      font-weight="700"
      font-size="11"
      fill="#00FF87"
      letter-spacing="0.25em"
      filter="url(#greenGlow)"
    >[ DEEP RUNTIME ENGINE V0.24 ]</text>

    <!-- Giant Swiss Headline (Absolutely coolest typography) -->
    <text
      x="-4"
      y="90"
      class="text-neo"
      font-weight="900"
      font-size="94"
      fill="#FFFFFF"
      letter-spacing="-0.05em"
    >
      <tspan x="-4" dy="0">LESS IS</tspan>
      <tspan x="-4" dy="84" fill="url(#cyberPurple)" filter="url(#purpleGlow)">THE CORE.</tspan>
    </text>

    <text
      x="0"
      y="240"
      class="text-neo"
      font-weight="400"
      font-size="16"
      fill="#8E92A2"
      line-height="1.7"
    >
      <tspan x="0" dy="0">High-performance Declarative Shadow DOM (DSD) compiler.</tspan>
      <tspan
        x="0"
        dy="26"
      >Zero Virtual-DOM reconciliation. Microsecond Signal reactive update.</tspan>
      <tspan
        x="0"
        dy="26"
      >Deterministic compilation validated via formal architecture gates.</tspan>
    </text>

    <!-- Visualizer Line (Cyberpunk laser core line) -->
    <g transform="translate(0, 330)">
      <line x1="0" y1="0" x2="480" y2="0" stroke="rgba(255,255,255,0.06)" stroke-width="2" />
      <line
        x1="80"
        y1="0"
        x2="280"
        y2="0"
        stroke="url(#laserGreen)"
        stroke-width="3"
        filter="url(#laserLineGlow)"
      />
      <circle cx="280" cy="0" r="4" fill="#60EFFF" filter="url(#greenGlow)" />
      <text
        x="480"
        y="-10"
        class="text-code"
        font-size="10"
        fill="#00FF87"
        text-anchor="end"
      >SIGNAL CORRELATION: 99.82%</text>
    </g>

    <!-- Cyber terminal showcase -->
    <g transform="translate(0, 370)">
      <rect width="480" height="190" rx="6" fill="#030406" class="border-futuristic" />

      <!-- Terminal header -->
      <rect width="480" height="34" fill="#080A0E" rx="6" />
      <circle cx="16" cy="17" r="4" fill="#EF4444" />
      <circle cx="28" cy="17" r="4" fill="#F59E0B" />
      <circle cx="40" cy="17" r="4" fill="#10B981" />
      <text
        x="64"
        y="21"
        class="text-code"
        font-size="11"
        fill="#8E92A2"
      >lessjs-compile-stream</text>

      <!-- Live compilation metrics logs -->
      <g transform="translate(20, 56)" class="text-code" font-size="11.5" font-weight="500">
        <text x="0" y="15" fill="#7C6FF5">➜  less-app</text>
        <text x="96" y="15" fill="#E9ECEF">deno task build:docs</text>
        <text x="0" y="40" fill="#8E92A2">[info]</text>
        <text x="60" y="40" fill="#E9ECEF">Scanning routes folder... 41 routes mapped.</text>
        <text x="0" y="60" fill="#8E92A2">[info]</text>
        <text x="60" y="60" fill="#E9ECEF">i18n expansion active: [en, zh] &lt;dynamic&gt;</text>
        <text x="0" y="80" fill="#8E92A2">[info]</text>
        <text
          x="60"
          y="80"
          fill="#00FF87"
          filter="url(#greenGlow)"
        >DSD pre-render OK -> dist/client/ in 43ms (budget: 100ms)</text>
        <text x="0" y="105" fill="#8E92A2">[gate]</text>
        <text
          x="60"
          y="105"
          fill="#60EFFF"
        >Package graph verified: 18 nodes, 0 cycles. [PASS]</text>
      </g>
    </g>
  </g>

  <!-- ==================== RIGHT PANEL: HIGH-FREQUENCY GRAPH & COMPONENT ==================== -->
  <g transform="translate(640, 140)">
    <!-- Outer glassmorphic frame -->
    <rect
      width="480"
      height="580"
      rx="8"
      fill="#05070B"
      class="border-bright"
      filter="drop-shadow(0 30px 60px rgba(0,0,0,0.4))"
    />
    <rect width="480" height="580" rx="8" fill="none" class="border-futuristic" />

    <!-- Terminal Inner Tabs -->
    <g>
      <rect width="480" height="54" fill="#090B11" rx="8" />
      <line x1="0" y1="54" x2="480" y2="54" class="border-bright" />

      <!-- Interactive Glowing Tabs -->
      <text
        x="24"
        y="32"
        class="text-neo"
        font-weight="900"
        font-size="13"
        fill="#FFFFFF"
      >HYPER-GRAPH ENGINE</text>

      <!-- Tabs (pill status style) -->
      <rect
        x="254"
        y="14"
        width="96"
        height="26"
        rx="13"
        fill="#7C6FF5"
        filter="url(#purpleGlow)"
      />
      <text
        x="302"
        y="31"
        class="text-neo"
        font-weight="700"
        font-size="11.5"
        fill="#FFFFFF"
        text-anchor="middle"
      >LIVE MAP</text>

      <rect x="362" y="14" width="94" height="26" rx="13" fill="none" class="border-bright" />
      <text
        x="409"
        y="31"
        class="text-neo"
        font-weight="700"
        font-size="11.5"
        fill="#7C6FF5"
        text-anchor="middle"
      >METRICS</text>
    </g>

    <!-- Visualized Interactive Package Dependency Graph (Absolutes Coolest Feature) -->
    <g transform="translate(24, 76)">
      <rect width="432" height="220" rx="6" fill="#010204" class="border-futuristic" />

      <!-- Core central node -->
      <circle
        cx="216"
        cy="110"
        r="28"
        fill="#7C6FF5"
        fill-opacity="0.15"
        stroke="#7C6FF5"
        stroke-width="2"
        filter="url(#purpleGlow)"
      />
      <text
        x="216"
        y="114"
        class="text-code"
        font-weight="900"
        font-size="11"
        fill="#FFFFFF"
        text-anchor="middle"
      >@core</text>

      <!-- Surrounding dependency orbit rings -->
      <circle
        cx="216"
        cy="110"
        r="75"
        fill="none"
        stroke="rgba(124,111,245,0.08)"
        stroke-width="1.5"
        stroke-dasharray="4 8"
      />

      <!-- Surrounding orbital packages -->
      <!-- Node 1: runtime facade -->
      <g transform="translate(216, 35)">
        <circle
          cx="0"
          cy="0"
          r="16"
          fill="#05070B"
          stroke="#60EFFF"
          stroke-width="1.5"
          filter="url(#greenGlow)"
        />
        <text
          x="0"
          y="4"
          class="text-code"
          font-weight="700"
          font-size="8.5"
          fill="#E9ECEF"
          text-anchor="middle"
        >rt</text>
        <line
          x1="0"
          y1="16"
          x2="0"
          y2="47"
          stroke="rgba(96,239,255,0.4)"
          stroke-width="1"
          stroke-dasharray="2 2"
        />
      </g>

      <!-- Node 2: signals -->
      <g transform="translate(136, 110)">
        <circle
          cx="0"
          cy="0"
          r="16"
          fill="#05070B"
          stroke="#00FF87"
          stroke-width="1.5"
          filter="url(#greenGlow)"
        />
        <text
          x="0"
          y="4"
          class="text-code"
          font-weight="700"
          font-size="8.5"
          fill="#E9ECEF"
          text-anchor="middle"
        >sig</text>
        <line x1="16" y1="0" x2="52" y2="0" stroke="rgba(0,255,135,0.4)" stroke-width="1" />
      </g>

      <!-- Node 3: style-sheet -->
      <g transform="translate(296, 110)">
        <circle cx="0" cy="0" r="16" fill="#05070B" stroke="#7C6FF5" stroke-width="1.5" />
        <text
          x="0"
          y="4"
          class="text-code"
          font-weight="700"
          font-size="8.5"
          fill="#E9ECEF"
          text-anchor="middle"
        >css</text>
        <line x1="-16" y1="0" x2="-52" y2="0" stroke="rgba(124,111,245,0.4)" stroke-width="1" />
      </g>

      <!-- Node 4: adapter-vite -->
      <g transform="translate(216, 185)">
        <circle cx="0" cy="0" r="16" fill="#05070B" stroke="#FB7185" stroke-width="1.5" />
        <text
          x="0"
          y="4"
          class="text-code"
          font-weight="700"
          font-size="8.5"
          fill="#E9ECEF"
          text-anchor="middle"
        >vite</text>
        <line x1="0" y1="-16" x2="0" y2="-47" stroke="rgba(251,113,133,0.4)" stroke-width="1" />
      </g>

      <!-- Graph metric overlays -->
      <rect
        x="12"
        y="12"
        width="100"
        height="34"
        rx="4"
        fill="#05070B"
        fill-opacity="0.8"
        class="border-futuristic"
      />
      <text x="20" y="24" class="text-code" font-size="9" fill="#8E92A2">GRAPH NODES</text>
      <text
        x="20"
        y="39"
        class="text-neo"
        font-weight="800"
        font-size="13"
        fill="#00FF87"
      >18 NODES</text>

      <rect
        x="320"
        y="12"
        width="100"
        height="34"
        rx="4"
        fill="#05070B"
        fill-opacity="0.8"
        class="border-futuristic"
      />
      <text x="328" y="24" class="text-code" font-size="9" fill="#8E92A2">CYCLES GATE</text>
      <text
        x="328"
        y="39"
        class="text-neo"
        font-weight="800"
        font-size="13"
        fill="#00FF87"
      >0 CYCLES</text>
    </g>

    <!-- Reactive Live Showcase Component Display -->
    <g transform="translate(24, 314)">
      <text
        x="0"
        y="16"
        class="text-neo"
        font-weight="700"
        font-size="13"
        fill="#FFFFFF"
      >LIVE COMPONENT PREVIEW</text>

      <!-- Interactive Counter Mockup -->
      <g transform="translate(0, 32)">
        <rect width="432" height="196" rx="6" fill="#010204" class="border-futuristic" />

        <!-- Live Island label -->
        <rect
          x="16"
          y="14"
          width="112"
          height="22"
          rx="4"
          fill="rgba(0,255,135,0.08)"
          stroke="rgba(0,255,135,0.2)"
          stroke-width="1"
        />
        <circle cx="26" cy="25" r="3" fill="#00FF87" filter="url(#greenGlow)" />
        <text
          x="36"
          y="29"
          class="text-code"
          font-weight="700"
          font-size="9.5"
          fill="#00FF87"
        >ISLAND: ACTIVE</text>

        <!-- Beautiful Counter Box -->
        <g transform="translate(116, 68)">
          <rect
            width="200"
            height="60"
            rx="30"
            fill="#080A0F"
            stroke="url(#cyberPurple)"
            stroke-width="2"
            filter="url(#purpleGlow)"
          />

          <!-- Decrement button -->
          <circle
            cx="30"
            cy="30"
            r="18"
            fill="#12151D"
            stroke="rgba(255,255,255,0.08)"
            stroke-width="1"
          />
          <text
            x="30"
            y="35"
            class="text-neo"
            font-weight="800"
            font-size="18"
            fill="#8E92A2"
            text-anchor="middle"
          >−</text>

          <!-- Value with signal active green glow -->
          <text
            x="100"
            y="39"
            class="text-neo"
            font-weight="900"
            font-size="28"
            fill="#FFFFFF"
            text-anchor="middle"
          >42</text>

          <!-- Increment button -->
          <circle
            cx="170"
            cy="30"
            r="18"
            fill="#12151D"
            stroke="rgba(255,255,255,0.08)"
            stroke-width="1"
          />
          <text
            x="170"
            y="35"
            class="text-neo"
            font-weight="800"
            font-size="18"
            fill="#8E92A2"
            text-anchor="middle"
          >+</text>
        </g>

        <!-- Reactive feedback caption -->
        <text x="216" y="165" class="text-code" font-size="11" fill="#8E92A2" text-anchor="middle">
          State mutated via <tspan
            fill="#7C6FF5"
            font-weight="700"
          >signal.value</tspan>. Total Renders: 1
        </text>
      </g>
    </g>
  </g>
</svg>
