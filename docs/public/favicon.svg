<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- KISSJS Favicon: Geometric K, adapts to light/dark mode -->
  <!-- Light mode: black K on transparent -->
  <style>
  .k-stroke {
    stroke: #000;
  }
  @media (prefers-color-scheme: dark) {
    .k-stroke {
      stroke: #fff;
    }
  }
  </style>
  <!-- Vertical stem -->
  <line x1="8" y1="6" x2="8" y2="26" class="k-stroke" stroke-width="3.5" stroke-linecap="round" />
  <!-- Upper diagonal -->
  <line x1="8" y1="16" x2="24" y2="6" class="k-stroke" stroke-width="3.5" stroke-linecap="round" />
  <!-- Lower diagonal -->
  <line x1="8" y1="16" x2="24" y2="26" class="k-stroke" stroke-width="3.5" stroke-linecap="round" />
</svg>
