name: Test

on:
  push:
    branches: [main, dev]
  workflow_call:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run type check
        run: deno task typecheck

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run dependency audit
        run: deno audit

  package-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Check package graph
        run: deno task graph:check

  architecture-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Check architecture contract
        run: deno task arch:check

  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run core tests
        run: deno test packages/core/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-run --allow-ffi

  test-adapter-vite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run adapter-vite tests
        run: deno test packages/adapter-vite/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-run --allow-ffi

  test-rpc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run rpc tests
        run: deno test packages/rpc/__tests__/ --coverage --allow-read --allow-write

  test-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run ui tests
        run: deno test packages/ui/__tests__/ --coverage --allow-read --allow-write --allow-env

  test-create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run create tests
        run: deno test packages/create/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-run --allow-ffi

  test-i18n:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run i18n tests
        run: deno test packages/i18n/__tests__/ --coverage --allow-read --allow-write --allow-env

  test-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run content tests
        run: deno test packages/content/__tests__/ --coverage --allow-read --allow-write --allow-env

  test-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run hub tests
        run: deno test packages/hub/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-net --allow-run
      - name: Hub validate
        run: deno task hub:validate
      - name: Hub check-index (read-only)
        run: deno task hub:check-index

  hub-scan:
    runs-on: ubuntu-latest
    needs: [test-hub]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Install Playwright Chromium
        run: deno run -A npm:playwright@1.59.1 install chromium --with-deps
      - name: Hub scan (Playwright snapshots)
        run: deno task hub:scan

  dsd-report-gate:
    runs-on: ubuntu-latest
    needs: [build-www]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Build www site
        run: deno task build:docs
      - name: Check DSD report
        run: deno task dsd:check-report

  test-adapter-lit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run adapter-lit tests
        run: deno test packages/adapter-lit/__tests__/ --coverage --allow-read --allow-write --allow-env

  test-adapter-react:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run adapter-react tests
        run: deno test packages/adapter-react/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-net --allow-run --allow-ffi

  test-adapter-vanilla:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run adapter-vanilla tests
        run: deno test packages/adapter-vanilla/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-net --allow-run --allow-ffi

  test-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run app tests
        run: deno test packages/app/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-net --allow-run --allow-ffi

  test-cem:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run cem tests
        run: deno test packages/cem/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-net --allow-run --allow-ffi

  test-compat-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run compat-check tests
        run: deno test packages/compat-check/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-net --allow-run --allow-ffi

  test-protocols:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run protocols tests
        run: deno test packages/protocols/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-net --allow-run --allow-ffi

  test-router:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run router tests
        run: deno test packages/router/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-net --allow-run --allow-ffi

  test-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run runtime tests
        run: deno test packages/runtime/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-net --allow-run --allow-ffi

  test-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run signals tests
        run: deno test packages/signals/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-net --allow-run --allow-ffi

  test-ssg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run ssg tests
        run: deno test packages/ssg/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-net --allow-run --allow-ffi

  test-style-sheet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Run style-sheet tests
        run: deno test packages/style-sheet/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-net --allow-run --allow-ffi

  build-www:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Build www site
        run: deno task build:docs

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Install Playwright Chromium
        run: deno run -A npm:playwright@1.59.1 install chromium --with-deps
      - name: Build www site
        run: deno task build:docs
      - name: Run E2E tests
        run: deno task test:e2e

  coverage:
    runs-on: ubuntu-latest
    needs: [
      test-core,
      test-adapter-vite,
      test-rpc,
      test-ui,
      test-create,
      test-i18n,
      test-content,
      test-hub,
      test-adapter-lit,
      test-adapter-react,
      test-adapter-vanilla,
      test-app,
      test-cem,
      test-compat-check,
      test-protocols,
      test-router,
      test-runtime,
      test-signals,
      test-ssg,
      test-style-sheet,
    ]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Check coverage threshold
        run: deno run --allow-read --allow-run --allow-write --allow-env --allow-net tools/check-coverage.ts --threshold 50
