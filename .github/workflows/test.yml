name: Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_call:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Run type check
        run: deno task typecheck

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Run dependency audit
        run: deno audit

  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Run core tests
        run: deno test packages/core/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-run --allow-ffi

  test-adapter-vite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Run adapter-vite tests
        run: deno test packages/adapter-vite/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-run --allow-ffi

  test-rpc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Run rpc tests
        run: deno test packages/rpc/__tests__/ --coverage --allow-read --allow-write

  test-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Run ui tests
        run: deno test packages/ui/__tests__/ --coverage --allow-read --allow-write --allow-env

  test-create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Run create tests
        run: deno test packages/create/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-run --allow-ffi

  test-i18n:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Run i18n tests
        run: deno test packages/i18n/__tests__/ --coverage --allow-read --allow-write --allow-env

  test-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Run content tests
        run: deno test packages/content/__tests__/ --coverage --allow-read --allow-write --allow-env

  test-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Run hub tests
        run: deno test packages/hub/__tests__/ --coverage --allow-read --allow-write --allow-env --allow-net --allow-run
      - name: Hub validate
        run: deno task hub:validate
      - name: Hub check-index (read-only)
        run: deno task hub:check-index

  hub-scan:
    runs-on: ubuntu-latest
    needs: [test-hub]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Install Playwright Chromium
        run: npx -y playwright install chromium --with-deps
      - name: Hub scan (Playwright snapshots)
        run: deno task hub:scan

  dsd-report-gate:
    runs-on: ubuntu-latest
    needs: [build-www]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Build www site
        run: deno task build:docs
      - name: Check DSD report
        run: deno task dsd:check-report

  test-adapter-lit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Run adapter-lit tests
        run: deno test packages/adapter-lit/__tests__/ --coverage --allow-read --allow-write --allow-env

  build-www:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Build www site
        run: deno task build:docs

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Install Playwright Chromium
        run: npx -y playwright install chromium --with-deps
      - name: Build www site
        run: deno task build:docs
      - name: Run E2E tests
        run: deno task test:e2e

  # v0.23: Package graph check (SOP-005)
  package-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Check package graph
        run: deno task graph:check
