name: AutoFlow CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_call:
  workflow_dispatch:

jobs:
  autoflow-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: AutoFlow3 CI gate
        run: deno task autoflow:ci
