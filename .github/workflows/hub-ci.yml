# Archived Hub Submission CI
#
# Hub is frozen for the v0.40 product-line reset. This workflow is retained as
# a manual historical validator only; Hub submissions are no longer accepted as
# an active product path.
#
# @see ADR-0030
# @see ADR-0101
# @see docs/current/VERSION_PLAN.md

name: Hub Submission CI (Archived)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate archived Hub data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Hub record validator
        run: deno task hub:validate --strict

      - name: Check archived hub-index drift
        run: deno task hub:check-index
