name: Publish to JSR + npm

on:
  push:
    branches: [main]
    paths:
      - 'packages/*/deno.json'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Install dependencies
        run: deno install --node-modules-dir

      - name: Build @lessjs/ui
        working-directory: packages/ui
        run: deno task build

      - name: Publish to JSR (missing versions only)
        shell: bash
        run: |
          set -euo pipefail

          publish_if_missing() {
            local pkg="$1"
            local dir="$2"
            local version
            version="$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' "$dir/deno.json" | head -n 1)"

            if deno info --no-config "jsr:${pkg}@${version}" >/dev/null 2>&1; then
              echo "[JSR] ${pkg}@${version} already exists; skipping."
              return 0
            fi

            echo "[JSR] Publishing ${pkg}@${version}"
            (cd "$dir" && deno publish -c deno.json --allow-dirty)
          }

          publish_if_missing "@lessjs/rpc" "packages/rpc"
          publish_if_missing "@lessjs/ui" "packages/ui"
          publish_if_missing "@lessjs/adapter-lit" "packages/adapter-lit"
          publish_if_missing "@lessjs/core" "packages/core"
          publish_if_missing "@lessjs/create" "packages/create"

      - name: Publish to npm (dnt transform)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN not set; skipping npm publish."
            exit 0
          fi

          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

          publish_npm() {
            local dir="$1"
            local pkg="$2"
            local version
            version="$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' "$dir/deno.json" | head -n 1)"

            # Check if version already exists on npm
            if npm view "${pkg}@${version}" version >/dev/null 2>&1; then
              echo "[npm] ${pkg}@${version} already exists; skipping."
              return 0
            fi

            echo "[npm] Building ${pkg}@${version}"
            deno run -A "$dir/_build_npm.ts"

            echo "[npm] Publishing ${pkg}@${version}"
            cd "$dir/npm"
            npm publish --access public
            cd "$OLDPWD"
          }

          # Publish in dependency order: rpc → ui → adapter-lit → core → create
          publish_npm "packages/rpc" "@lessjs/rpc"
          publish_npm "packages/ui" "@lessjs/ui"
          publish_npm "packages/adapter-lit" "@lessjs/adapter-lit"
          publish_npm "packages/core" "@lessjs/core"
          publish_npm "packages/create" "@lessjs/create"
