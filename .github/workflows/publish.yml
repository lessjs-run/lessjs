name: Publish to JSR

on:
  push:
    branches: [main]
    paths:
      - 'packages/*/deno.json'
      - '.github/workflows/publish.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Install dependencies
        run: deno install --node-modules-dir

      - name: Build @kissjs/ui
        working-directory: packages/kiss-ui
        run: deno task build

      - name: Publish @kissjs/core
        working-directory: packages/kiss-core
        run: deno publish --allow-dirty --token "${{ secrets.JSR_TOKEN }}"

      - name: Publish @kissjs/rpc
        working-directory: packages/kiss-rpc
        run: deno publish --allow-dirty --token "${{ secrets.JSR_TOKEN }}"

      - name: Publish @kissjs/ui
        working-directory: packages/kiss-ui
        run: deno publish --allow-dirty --token "${{ secrets.JSR_TOKEN }}"

      - name: Publish @kissjs/adapter-lit
        working-directory: packages/kiss-adapter-lit
        run: deno publish --allow-dirty --token "${{ secrets.JSR_TOKEN }}"

      - name: Publish @kissjs/create
        working-directory: packages/create-kiss
        run: deno publish --allow-dirty --token "${{ secrets.JSR_TOKEN }}"
