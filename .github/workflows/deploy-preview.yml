name: Deploy Preview to Cloudflare Pages

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: 'preview-deploy'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'

      - name: Install dependencies
        run: deno install --node-modules-dir

      - name: Build docs
        run: deno task build:docs

      - name: Add preview banner
        run: |
          # Inject a small visual banner so visitors know this is a preview
          BANNER_HTML='<div id="lessjs-preview-banner" style="position:fixed;top:0;left:0;right:0;z-index:99999;background:#f59e0b;color:#000;font-size:0.75rem;font-weight:600;text-align:center;padding:0.25rem 0;font-family:system-ui,sans-serif;">⚠️ Dev Preview — not a stable release. See <a href="https://lessjs.com/roadmap" style="color:#000;text-decoration:underline;">roadmap</a>.</div>'
          # Insert banner into all HTML files
          find docs/dist -name "*.html" -exec sed -i "s|</body>|${BANNER_HTML}</body>|" {} +

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/dist --project-name=lessjs-dev --branch=dev

      - name: Print preview URL
        run: |
          echo "🚀 Preview deployed to: ${{ steps.deploy.outputs.url }}"
          echo "Branch: dev"
          echo "Commit: ${{ github.sha }}"
