# SOP Gate — v0.21.x Hardening CI
#
# Runs the full 11-gate SOP pipeline defined in docs/sop/v0.21.x/README.md.
# Triggered on push to dev/main and on PRs. Also available via workflow_dispatch.
#
# If any gate fails, v0.22.0 Edge Full-Stack should NOT start.

name: SOP Gate (v0.21.x)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  # ─── Gate 1 ───
  fmt-check:
    name: 'fmt:check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - run: deno task fmt:check

  # ─── Gate 2 ───
  lint:
    name: 'lint'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - run: deno task lint

  # ─── Gate 3 ───
  typecheck:
    name: 'typecheck'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - run: deno install --node-modules-dir
      - run: deno task typecheck

  # ─── Gate 4 ───
  audit:
    name: 'audit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - run: deno audit

  # ─── Gate 5 — Full test suite (includes SSG starter proof) ───
  test:
    name: 'test (incl. SSG starter proof)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - run: deno install --node-modules-dir
      - name: Run full test suite
        run: deno task test

  # ─── Gate 5b — SSG starter proof (isolated) ───
  # SOP-010 Q4: Does the SSG blog/docs path build from a generated project?
  # This runs ONLY the create package test that scaffolds + builds end-to-end.
  test-ssg-starter:
    name: 'SSG starter proof (SOP-010 Q4)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - run: deno install --node-modules-dir
      - name: Run SSG starter proof test
        run: deno test packages/create/__tests__/cli.test.ts --allow-read --allow-write --allow-env --allow-run --allow-ffi --filter "generated project builds"

  # ─── Gate 6 — Build ───
  build:
    name: 'build'
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - run: deno install --node-modules-dir
      - run: deno task build

  # ─── Gate 7 — DSD conformance report ───
  dsd-check:
    name: 'dsd:check-report'
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - run: deno install --node-modules-dir
      - run: deno task dsd:check-report

  # ─── Gate 8 — Hub validation ───
  hub-validate:
    name: 'hub:validate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - run: deno install --node-modules-dir
      - run: deno task hub:validate -- --strict --json

  # ─── Gate 9 — Hub index check ───
  hub-check-index:
    name: 'hub:check-index'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - run: deno task hub:check-index

  # ─── Gate 10 — Strategic docs check ───
  docs-check:
    name: 'docs:check-strategy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - run: deno task docs:check-strategy

  # ─── Gate 11 — E2E tests ───
  test-e2e:
    name: 'test:e2e'
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - run: deno install --node-modules-dir
      - name: Install Playwright Chromium
        run: npx -y playwright@1.59.1 install chromium --with-deps
      - name: Run E2E tests
        run: deno task test:e2e

  # ─── Gate Summary ───
  gate-summary:
    name: 'SOP Gate Summary'
    runs-on: ubuntu-latest
    needs:
      [
        fmt-check,
        lint,
        typecheck,
        audit,
        test,
        test-ssg-starter,
        build,
        dsd-check,
        hub-validate,
        hub-check-index,
        docs-check,
        test-e2e,
      ]
    if: always()
    steps:
      - name: Check all gates
        run: |
          echo "## SOP Gate v0.21.x Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          declare -A results
          results[fmt-check]="${{ needs.fmt-check.result }}"
          results[lint]="${{ needs.lint.result }}"
          results[typecheck]="${{ needs.typecheck.result }}"
          results[audit]="${{ needs.audit.result }}"
          results[test]="${{ needs.test.result }}"
          results[ssg-starter-proof]="${{ needs.test-ssg-starter.result }}"
          results[build]="${{ needs.build.result }}"
          results[dsd-check-report]="${{ needs.dsd-check.result }}"
          results[hub-validate]="${{ needs.hub-validate.result }}"
          results[hub-check-index]="${{ needs.hub-check-index.result }}"
          results[docs-check-strategy]="${{ needs.docs-check.result }}"
          results[test-e2e]="${{ needs.test-e2e.result }}"

          ALL_PASS=true
          for gate in "${!results[@]}"; do
            status="${results[$gate]}"
            if [ "$status" = "success" ]; then
              echo "- [x] $gate :white_check_mark:" >> $GITHUB_STEP_SUMMARY
            else
              echo "- [ ] $gate :x: ($status)" >> $GITHUB_STEP_SUMMARY
              ALL_PASS=false
            fi
          done

          if [ "$ALL_PASS" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo ":tada: **All 12 SOP gates passed. v0.22.0 Edge Full-Stack may proceed.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo ":warning: **Some gates failed. v0.22.0 must not start until all gates pass.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
