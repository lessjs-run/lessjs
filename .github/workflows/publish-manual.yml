name: Publish to JSR (manual)

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to publish (comma-separated: rpc,signals,core,adapter-vite,content,i18n,adapter-lit,ui,app,create)'
        required: true
        default: 'rpc,signals,core,adapter-vite,content,i18n,adapter-lit,ui,app,create'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  publish:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'

      - name: Install dependencies
        run: deno install --node-modules-dir

      - name: Publish requested packages to JSR
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::Refusing to publish from a dirty worktree"
            git status --porcelain
            exit 1
          fi

          requested=",${{ github.event.inputs.packages }},"

          wants() {
            [[ "$requested" == *",$1,"* ]]
          }

          publish_if_requested_and_missing() {
            local key="$1"
            local pkg="$2"
            local dir="$3"

            if ! wants "$key"; then
              echo "[JSR] ${pkg} not requested; skipping."
              return 0
            fi

            local version
            version="$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' "$dir/deno.json" | head -n 1)"

            if deno info --no-config "jsr:${pkg}@${version}" >/dev/null 2>&1; then
              echo "[JSR] ${pkg}@${version} already exists; skipping."
              return 0
            fi

            echo "[JSR] Publishing ${pkg}@${version}"
            (cd "$dir" && deno publish -c deno.json)
          }

          publish_if_requested_and_missing "rpc" "@lessjs/rpc" "packages/rpc"
          publish_if_requested_and_missing "signals" "@lessjs/signals" "packages/signals"
          publish_if_requested_and_missing "core" "@lessjs/core" "packages/core"
          publish_if_requested_and_missing "adapter-vite" "@lessjs/adapter-vite" "packages/adapter-vite"
          publish_if_requested_and_missing "content" "@lessjs/content" "packages/content"
          publish_if_requested_and_missing "i18n" "@lessjs/i18n" "packages/i18n"
          publish_if_requested_and_missing "adapter-lit" "@lessjs/adapter-lit" "packages/adapter-lit"
          publish_if_requested_and_missing "ui" "@lessjs/ui" "packages/ui"
          publish_if_requested_and_missing "app" "@lessjs/app" "packages/app"
          publish_if_requested_and_missing "create" "@lessjs/create" "packages/create"
