name: Publish to JSR (manual)

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to publish (comma-separated keys; dependencies included automatically)'
        required: true
        default: 'adapter-vite,app'

concurrency:
  group: jsr-publish
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml

  publish:
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 360
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'

      - name: Install dependencies
        run: deno install --node-modules-dir

      # `deno install` may rewrite deno.lock (transitive dep re-resolution,
      # platform-specific lock fields, version normalization). Discard the
      # install-induced rewrite so the publish dirty-tree guard sees a clean
      # worktree.
      - name: Reset deno.lock to committed state
        run: git checkout -- deno.lock

      - name: Publish requested packages to JSR
        run: >
          deno run --allow-read --allow-run --allow-net
          tools/run-package-graph-task.ts publish
          --only "${{ github.event.inputs.packages }}"
