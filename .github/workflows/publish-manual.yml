name: Publish to JSR + npm (manual)

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to publish (comma-separated: core,rpc,ui,adapter-lit,create)'
        required: true
        default: 'core,rpc,ui,adapter-lit,create'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'

      - name: Install dependencies
        run: deno install --node-modules-dir

      - name: Build @lessjs/ui (if publishing ui)
        if: contains(github.event.inputs.packages, 'ui')
        working-directory: packages/ui
        run: deno task build

      - name: Publish to JSR
        shell: bash
        run: |
          set -euo pipefail

          requested=",${{ github.event.inputs.packages }},"

          wants() {
            [[ "$requested" == *",$1,"* ]]
          }

          publish_if_requested_and_missing() {
            local key="$1"
            local pkg="$2"
            local dir="$3"

            if ! wants "$key"; then
              echo "[JSR] ${pkg} not requested; skipping."
              return 0
            fi

            local version
            version="$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' "$dir/deno.json" | head -n 1)"

            if deno info --no-config "jsr:${pkg}@${version}" >/dev/null 2>&1; then
              echo "[JSR] ${pkg}@${version} already exists; skipping."
              return 0
            fi

            echo "[JSR] Publishing ${pkg}@${version}"
            (cd "$dir" && deno publish -c deno.json --allow-dirty)
          }

          publish_if_requested_and_missing "rpc" "@lessjs/rpc" "packages/rpc"
          publish_if_requested_and_missing "ui" "@lessjs/ui" "packages/ui"
          publish_if_requested_and_missing "adapter-lit" "@lessjs/adapter-lit" "packages/adapter-lit"
          publish_if_requested_and_missing "core" "@lessjs/core" "packages/core"
          publish_if_requested_and_missing "create" "@lessjs/create" "packages/create"

      - name: Publish to npm (dnt transform)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN not set; skipping npm publish."
            exit 0
          fi

          requested=",${{ github.event.inputs.packages }},"

          wants() {
            [[ "$requested" == *",$1,"* ]]
          }

          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

          publish_npm() {
            local key="$1"
            local dir="$2"
            local pkg="$3"

            if ! wants "$key"; then
              echo "[npm] ${pkg} not requested; skipping."
              return 0
            fi

            local version
            version="$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' "$dir/deno.json" | head -n 1)"

            if npm view "${pkg}@${version}" version >/dev/null 2>&1; then
              echo "[npm] ${pkg}@${version} already exists; skipping."
              return 0
            fi

            echo "[npm] Building ${pkg}@${version}"
            # Must cd into the package dir so dnt resolves ./src/index.ts
            # against the package deno.json, not the workspace root.
            (cd "$dir" && deno run -A --config deno.json _build_npm.ts)

            echo "[npm] Publishing ${pkg}@${version}"
            cd "$dir/npm"
            npm publish --access public
            cd "$OLDPWD"
          }

          publish_npm "rpc" "packages/rpc" "@lessjs/rpc"
          publish_npm "ui" "packages/ui" "@lessjs/ui"
          publish_npm "adapter-lit" "packages/adapter-lit" "@lessjs/adapter-lit"
          publish_npm "core" "packages/core" "@lessjs/core"
          publish_npm "create" "packages/create" "@lessjs/create"
