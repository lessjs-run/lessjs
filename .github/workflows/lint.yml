name: Lint & Format

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'

      # TODO: Include www/ once upstream Deno fmt bug is fixed.
      # Bug: Deno fmt panics on html-tagged template literals containing HTML entities.
      # Track: https://github.com/denoland/deno/issues/30948
      # Also:  https://github.com/denoland/deno/issues/32954
      # When resolved, change to: deno fmt --check
      - name: Check formatting (packages only, skip www/ due to Deno fmt panic on tagged templates with HTML entities)
        run: deno fmt --check packages/

      # TODO: Include www/ once Deno lint handles the same patterns.
      # When resolved, change to: deno lint
      - name: Run linter (packages only, skip www/ entirely)
        run: deno lint packages/
