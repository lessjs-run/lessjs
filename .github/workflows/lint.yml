name: Lint & Format

on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'

      - name: Check project workflow
        run: deno task workflow:check

      - name: Check formatting
        run: deno task fmt:check

      - name: Run linter
        run: deno task lint

      - name: Run autoflow invariant check
        run: deno task autoflow:check
