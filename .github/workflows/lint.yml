name: Lint & Format

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'

      - name: Check formatting
        run: deno task fmt:check

      - name: Run linter
        run: deno task lint
