name: Fast Gate

on:
  pull_request:
    branches: [main, dev]

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Format check
        run: deno task fmt:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Lint
        run: deno task lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Type check
        run: deno task typecheck

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Dependency audit
        run: deno audit

  package-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Package graph check
        run: deno task graph:check

  architecture-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Architecture contract
        run: deno task arch:check

  autoflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: AutoFlow check
        run: deno run --allow-read --allow-write tools/autoflow/mod-check.ts

  workflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace
      - name: Workflow check
        run: deno task workflow:check
