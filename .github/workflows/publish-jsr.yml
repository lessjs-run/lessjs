name: Publish to JSR

on:
  push:
    branches: [main]
    paths:
      - 'packages/*/deno.json'
      - 'packages/*/src/**'
      - 'packages/*/README.md'
      - 'packages/create/cli.ts'
      - 'deno.lock'
      - '.github/workflows/publish-jsr.yml'
  workflow_dispatch:

jobs:
  # Gate: run tests before publishing
  test:
    uses: ./.github/workflows/test.yml

  publish:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno-workspace

      # `deno install` may rewrite deno.lock (transitive dep re-resolution,
      # platform-specific lock fields, version normalization). Since deno.lock
      # is already in the trigger paths, we trust the committed version and
      # discard the install-induced rewrite to keep the publish guard happy.
      - name: Reset deno.lock to committed state
        run: git checkout -- deno.lock

      - name: Publish to JSR (missing versions only)
        shell: bash
        run: |
          set -euo pipefail

          publish_if_missing() {
            local pkg="$1"
            local dir="$2"
            local version
            version="$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' "$dir/deno.json" | head -n 1)"

            if deno info --no-config "jsr:${pkg}@${version}" >/dev/null 2>&1; then
              echo "[JSR] ${pkg}@${version} already exists; skipping."
              return 0
            fi

            echo "[JSR] Publishing ${pkg}@${version}"
            (cd "$dir" && deno publish -c deno.json)
          }

          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::Refusing to publish from a dirty worktree"
            git status --porcelain
            exit 1
          fi

          # Publish in dependency order: truly leaf first, then dependents
          #   leaf (zero openElement deps): rpc, protocols, router, style-sheet, create
          #   core: zero openElement deps, but needed by many packages below
          publish_if_missing "@openelement/rpc" "packages/rpc"
          publish_if_missing "@openelement/protocols" "packages/protocols"
          publish_if_missing "@openelement/router" "packages/router"
          publish_if_missing "@openelement/style-sheet" "packages/style-sheet"
          publish_if_missing "@openelement/create" "packages/create"
          # v0.24.3: @openelement/signals is now a dependency of @openelement/core (effect() for VNode signal tracking)
          publish_if_missing "@openelement/signals" "packages/signals"
          publish_if_missing "@openelement/core" "packages/core"
          publish_if_missing "@openelement/runtime" "packages/runtime"
          publish_if_missing "@openelement/cem" "packages/cem"
          publish_if_missing "@openelement/compat-check" "packages/compat-check"
          publish_if_missing "@openelement/content" "packages/content"
          publish_if_missing "@openelement/i18n" "packages/i18n"
          publish_if_missing "@openelement/adapter-lit" "packages/adapter-lit"
          publish_if_missing "@openelement/adapter-react" "packages/adapter-react"
          publish_if_missing "@openelement/adapter-vanilla" "packages/adapter-vanilla"
          publish_if_missing "@openelement/adapter-vite" "packages/adapter-vite"
          publish_if_missing "@openelement/ui" "packages/ui"
          publish_if_missing "@openelement/hub" "packages/hub"
          #   depends on all above: app
          publish_if_missing "@openelement/app" "packages/app"

  # SOP-013: Post-Publish Consumer Smoke Test
  # Verifies that freshly published JSR packages form a complete, buildable
  # consumer project. This is the final release gate ˇŞ it catches problems that
  # pre-publish testing cannot because the new version does not yet exist on JSR.
  # Windows JSR-latest compatibility is monitored separately in
  # jsr-consumer-monitor.yml so this release gate stays fast and release-scoped.
  consumer-smoke:
    runs-on: ubuntu-latest
    needs: [publish]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Wait for JSR propagation
        run: sleep 30
      - name: Generate consumer project from JSR
        shell: bash
        run: |
          set -euo pipefail
          CREATE_VERSION="$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' packages/create/deno.json | head -n 1)"
          CONSUMER_DIR="${{ runner.temp }}/openelement-post-publish-smoke"
          rm -rf "$CONSUMER_DIR"
          mkdir -p "$CONSUMER_DIR"
          cd "$CONSUMER_DIR"
          for attempt in 1 2 3 4 5 6; do
            if deno run -A "jsr:@openelement/create@${CREATE_VERSION}" test-blog; then
              exit 0
            fi
            echo "create@${CREATE_VERSION} not ready yet; retrying in 10s (${attempt}/6)"
            rm -rf test-blog
            sleep 10
          done
          deno run -A "jsr:@openelement/create@${CREATE_VERSION}" test-blog
      - name: Build consumer project
        run: |
          CONSUMER_DIR="${{ runner.temp }}/openelement-post-publish-smoke"
          cd "$CONSUMER_DIR/test-blog"
          deno task build
      - name: Verify output
        run: |
          CONSUMER_DIR="${{ runner.temp }}/openelement-post-publish-smoke"
          test -f "$CONSUMER_DIR/test-blog/dist/index.html" || {
            echo "::error::dist/index.html not found ˇŞ post-publish consumer build failed"
            exit 1
          }
