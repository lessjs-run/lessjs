name: Setup Deno Workspace
description: Install Deno, restore workspace dependencies, and materialize node_modules.

runs:
  using: composite
  steps:
    - uses: denoland/setup-deno@v2
      with:
        deno-version: '2'
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
    - name: Install dependencies
      shell: bash
      run: deno install --node-modules-dir
