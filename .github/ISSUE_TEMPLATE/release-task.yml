name: Release Task
description: Track a version release to completion.
title: '[Release]: '
body:
  - type: markdown
    attributes:
      value: 'Release work must follow `docs/governance/PROJECT_WORKFLOW.md` and `docs/current/VERSION_PLAN.md`.'
  - type: input
    id: version
    attributes:
      label: Version
      description: Example: v0.40.0
    validations:
      required: true
  - type: input
    id: plan
    attributes:
      label: Version plan
      description: Example: docs/current/VERSION_PLAN.md
    validations:
      required: true
  - type: textarea
    id: gates
    attributes:
      label: Gates
      description: Local and CI gates required before merge/tag.
