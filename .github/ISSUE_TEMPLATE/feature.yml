name: Feature
description: Propose product work tied to the active version plan.
title: '[Feature]: '
body:
  - type: markdown
    attributes:
      value: 'Read `docs/governance/PROJECT_WORKFLOW.md` and `docs/current/VERSION_PLAN.md` before filing.'
  - type: input
    id: version
    attributes:
      label: Target version
      description: Example: v0.40.0
    validations:
      required: true
  - type: input
    id: plan
    attributes:
      label: Version plan
      description: Example: docs/current/VERSION_PLAN.md
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Describe the concrete behavior to implement.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Required evidence
      description: List tests, docs, gates, fixtures, or CI proof.
